services:
  postgres:
    image: postgres:17
    env_file:
      - ./.env.example
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      - postgres
    env_file:
      - ./.env.example
    ports:
      - "${PORT:-3000}:${PORT:-3000}"

volumes:
  postgres-data:
