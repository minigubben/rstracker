services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: rstracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      - postgres
    env_file:
      - ./.env.example
    ports:
      - "3000:3000"

volumes:
  postgres-data:
